<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Мой сайт</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #0f0f1a;
    color: white;
}

/* NAV */
header, footer {
    display: flex;
    justify-content: center;
    gap: 20px;
    padding: 15px;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(10px);
    position: sticky;
}

header { top: 0; }
footer { bottom: 0; }

nav a {
    color: white;
    text-decoration: none;
    cursor: pointer;
    padding: 8px 12px;
    border-radius: 10px;
    background: rgba(255,255,255,0.05);
}

nav a:hover {
    background: rgba(255,255,255,0.15);
}

/* SECTIONS */
.section {
    display: none;
    padding: 40px 20px;
    text-align: center;
    min-height: 60vh;
}

.section.active {
    display: block;
}

/* VIDEO */
.video-box {
    margin-top: 20px;
}

/* PHOTOS */
.photos {
    display: flex;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
}

.photos img {
    width: 300px;
    height: 190px;
    object-fit: cover;
    border-radius: 12px;
    transition: 0.3s;
}

.photos img:hover {
    transform: scale(1.05);
}

/* HERO */
.hero {
    padding: 60px 20px;
}
</style>
</head>

<body>

<header>
    <nav>
        <a onclick="show('home')">Главная</a>
        <a onclick="show('video')">Видео</a>
        <a onclick="show('photos')">Фотки</a>
        <a onclick="show('donate')">Донат</a>
    </nav>
</header>

<!-- HOME -->
<div id="home" class="section active">
    <div class="hero">
        <h2>🔥 Мой сайт</h2>
        <p>Красивый, простой и рабочий</p>
    </div>
</div>

<!-- PHOTOS -->
<div id="photos" class="section">
    <h2>📸 Фотки</h2>

    <div class="photos">
        <img src="file:///C:/Users/HP/Documents/коды/photo1.jpeg">
        <img src="photo2.jpeg">
        <img src="photo3.jpeg">
    </div>
</div>

<!-- DONATE -->
<div id="donate" class="section">
    <h2>💸 Донат</h2>
    <p>сюда можно вставить ссылку на оплату</p>
</div>

<footer>
    <nav>
        <a onclick="show('home')">Главная</a>
        <a onclick="show('video')">Видео</a>
        <a onclick="show('photos')">Фотки</a>
        <a onclick="show('donate')">Донат</a>
    </nav>
</footer>

<!-- VIDEO -->
<div id="video" class="section">
    <h2>🎬 Видео</h2>

    <iframe 
  src="https://drive.google.com/file/d/178c9UxO-5j9GMwbxXH_KqXn5hYVa9sxQ/preview"
  width="640"
  height="360"
  allow="autoplay"
  allowfullscreen>
</iframe>>


<script>
function show(id) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}
</script>

</body>
</html>
